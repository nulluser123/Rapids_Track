<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Rapid Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  html, body { height: 100%; background: #CBD5E1; font-family: 'DM Sans', sans-serif; }
  ::-webkit-scrollbar { width: 0; height: 0; }

  /* ── Layout ── */
  #app {
    max-width: 430px; margin: 0 auto; height: 100dvh;
    display: flex; flex-direction: column;
    background: #F8FAFC; box-shadow: 0 0 60px rgba(0,0,0,.18);
    position: relative; overflow: hidden;
  }
  .screen { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
  .screen-body { flex: 1; overflow-y: auto; }
  .hidden { display: none !important; }

  /* ── Typography ── */
  .mono { font-family: 'DM Mono', monospace; }
  .screen-title { font-size: 22px; font-weight: 800; color: #0F172A; letter-spacing: -.5px; }
  .screen-sub   { font-size: 12px; color: #94A3B8; font-weight: 500; margin-top: 2px; }
  .label        { font-size: 11px; font-weight: 700; color: #94A3B8; letter-spacing: .08em; text-transform: uppercase; }

  /* ── Header ── */
  .header {
    padding: 16px 20px 12px; background: #fff;
    border-bottom: 1px solid #F1F5F9; flex-shrink: 0;
  }
  .header-row { display: flex; align-items: center; justify-content: space-between; }
  .header-actions { display: flex; gap: 8px; }

  /* ── Buttons ── */
  .btn-icon {
    width: 38px; height: 38px; border-radius: 12px; border: none;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: opacity .15s;
  }
  .btn-icon:active { opacity: .7; }
  .btn-primary { background: linear-gradient(135deg,#0EA5E9,#3B82F6); box-shadow: 0 2px 8px #3B82F644; }
  .btn-secondary { background: #F1F5F9; }
  .btn-full {
    width: 100%; padding: 13px; border-radius: 12px; border: none;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: opacity .15s;
  }
  .btn-full:active { opacity: .8; }
  .btn-full:disabled { cursor: default; opacity: .6; }
  .btn-cancel { background: #fff; border: 1.5px solid #E2E8F0 !important; color: #64748B; }
  .btn-add-confirm { background: linear-gradient(135deg,#0EA5E9,#3B82F6); color: #fff; }

  /* ── Sync bar ── */
  .sync-section { margin-top: 10px; }
  .sync-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .sync-status { font-size: 11px; font-weight: 700; color: #0EA5E9; }
  .progress-track { height: 3px; background: #E2E8F0; border-radius: 2px; overflow: hidden; }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg,#0EA5E9,#3B82F6);
    border-radius: 0 2px 2px 0; transition: width .3s ease; width: 0%;
  }

  /* ── Player row ── */
  .player-list { padding: 8px 0; }
  .player-row {
    display: flex; align-items: center; padding: 11px 20px; gap: 13px;
    background: #fff; position: relative; transition: background .12s; cursor: default;
  }
  .player-row:active { background: #F8FAFC; }
  .rank { font-size: 12px; font-weight: 700; color: #CBD5E1; width: 22px; text-align: right; flex-shrink: 0; font-family: 'DM Mono', monospace; }
  .avatar {
    width: 42px; height: 42px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 700; color: #fff;
  }
  .avatar.mia { background: #E2E8F0 !important; box-shadow: none !important; color: #94A3B8 !important; }
  .player-info { flex: 1; min-width: 0; }
  .player-name-row { display: flex; align-items: center; gap: 6px; }
  .player-name {
    font-size: 15px; font-weight: 700; color: #0F172A; letter-spacing: -.2px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .player-name.mia { color: #94A3B8; }
  .mia-badge {
    font-size: 9px; font-weight: 700; color: #94A3B8;
    background: #F1F5F9; padding: 2px 6px; border-radius: 6px;
    letter-spacing: .08em; flex-shrink: 0;
  }
  .sparkline-wrap { margin-top: 4px; }
  .player-stats { text-align: right; flex-shrink: 0; }
  .rating-value { font-size: 18px; font-weight: 800; color: #0F172A; font-family: 'DM Mono', monospace; letter-spacing: -.5px; }
  .rating-value.mia { color: #94A3B8; }
  .delta { font-size: 12px; font-weight: 600; margin-top: 2px; }
  .delta.up   { color: #22C55E; }
  .delta.down { color: #EF4444; }
  .delta.flat { color: #94A3B8; }
  .remove-btn {
    position: absolute; right: 4px; top: 4px; width: 18px; height: 18px;
    border-radius: 50%; background: #FEE2E2; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity .2s; padding: 0;
  }
  .player-row:hover .remove-btn { opacity: 1; }

  /* ── Add modal ── */
  .modal-backdrop {
    position: absolute; inset: 0; background: rgba(15,23,42,.5);
    z-index: 100; display: flex; align-items: flex-end;
    backdrop-filter: blur(4px);
  }
  .modal-sheet {
    width: 100%; background: #fff; border-radius: 20px 20px 0 0;
    padding: 24px 20px 36px; box-shadow: 0 -8px 40px rgba(0,0,0,.15);
  }
  .modal-handle { width: 36px; height: 4px; background: #E2E8F0; border-radius: 2px; margin: 0 auto 20px; }
  .modal-title { font-size: 18px; font-weight: 700; color: #0F172A; margin-bottom: 4px; }
  .modal-sub   { font-size: 13px; color: #64748B; margin-bottom: 20px; }
  .modal-input {
    width: 100%; padding: 13px 16px; border-radius: 12px;
    border: 1.5px solid #E2E8F0; font-size: 15px; font-family: 'DM Sans', sans-serif;
    outline: none; color: #0F172A; background: #F8FAFC; transition: border-color .2s;
  }
  .modal-input:focus { border-color: #0EA5E9; }
  .modal-error { color: #EF4444; font-size: 12px; margin-top: 8px; min-height: 18px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 16px; }

  /* ── Comparison ── */
  .chart-card {
    background: #fff; border-radius: 16px; padding: 20px 16px 16px;
    border: 1px solid #F1F5F9; margin-bottom: 16px;
    box-shadow: 0 1px 6px rgba(0,0,0,.04);
  }
  .chart-area { display: flex; gap: 0; align-items: flex-end; height: 180px; }
  .chart-yaxis { display: flex; flex-direction: column; justify-content: space-between; height: 100%; padding-bottom: 28px; margin-right: 8px; }
  .chart-yaxis span { font-size: 10px; color: #CBD5E1; font-family: 'DM Mono', monospace; line-height: 1; }
  .chart-bars { flex: 1; display: flex; gap: 5px; align-items: flex-end; height: 100%; padding-bottom: 28px; }
  .chart-bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; position: relative; }
  .chart-delta-label { font-size: 9px; font-weight: 700; position: absolute; top: -15px; }
  .chart-bar { width: 100%; border-radius: 6px 6px 3px 3px; min-height: 12px; }
  .chart-bar-name { font-size: 9px; color: #94A3B8; font-weight: 600; text-align: center; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .legend-card {
    background: #fff; border: 1px solid #F1F5F9; border-radius: 12px; padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
  }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-label { font-size: 14px; font-weight: 500; color: #334155; }
  .legend-value { font-size: 13px; font-weight: 700; }

  .detail-list-card {
    background: #fff; border: 1px solid #F1F5F9; border-radius: 16px;
    overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,.04); margin-top: 16px;
  }
  .detail-list-header { padding: 12px 16px; border-bottom: 1px solid #F8FAFC; }
  .detail-row { display: flex; align-items: center; padding: 10px 16px; border-bottom: 1px solid #F8FAFC; gap: 12px; }
  .detail-row:last-child { border-bottom: none; }
  .detail-bar { width: 3px; height: 28px; border-radius: 2px; flex-shrink: 0; }
  .detail-name { flex: 1; font-size: 14px; font-weight: 600; color: #334155; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .detail-rating { font-size: 14px; font-weight: 800; color: #0F172A; font-family: 'DM Mono', monospace; }
  .detail-delta  { font-size: 12px; font-weight: 600; min-width: 36px; text-align: right; }

  /* ── Settings ── */
  .settings-section { margin-bottom: 24px; }
  .settings-card {
    background: #fff; border-radius: 16px; border: 1px solid #F1F5F9;
    overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,.04);
  }
  .settings-inner { padding: 18px; }
  .threshold-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .threshold-label { font-size: 15px; font-weight: 600; color: #0F172A; }
  .threshold-badge { font-size: 13px; font-weight: 700; color: #0EA5E9; background: #EFF6FF; padding: 4px 12px; border-radius: 20px; }
  input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; height: 4px; border-radius: 4px; background: #E2E8F0; outline: none; cursor: pointer; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: linear-gradient(135deg,#0EA5E9,#3B82F6); cursor: pointer; box-shadow: 0 1px 6px #0EA5E944; }
  .range-ticks { display: flex; justify-content: space-between; margin-top: 6px; }
  .range-tick  { font-size: 11px; color: #CBD5E1; }
  .range-tick.active { color: #0EA5E9; font-weight: 700; }

  .settings-row {
    display: flex; align-items: center; gap: 14px; padding: 16px 18px;
    background: none; border: none; width: 100%; text-align: left; cursor: pointer;
    border-bottom: 1px solid #F8FAFC;
  }
  .settings-row:last-child { border-bottom: none; }
  .settings-row-label { flex: 1; font-size: 15px; font-weight: 500; color: #334155; }
  .settings-row-label.danger { color: #EF4444; font-weight: 600; }
  .version-block { text-align: center; padding: 20px 0 8px; }
  .version-name { font-size: 15px; font-weight: 700; color: #CBD5E1; }
  .version-num  { font-size: 12px; color: #CBD5E1; margin-top: 3px; }

  /* ── Bottom nav ── */
  .bottom-nav { display: flex; border-top: 1px solid #F1F5F9; background: #fff; flex-shrink: 0; }
  .nav-btn { flex: 1; padding: 10px 0 8px; background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .nav-label { font-size: 10px; font-weight: 500; color: #94A3B8; letter-spacing: .04em; text-transform: uppercase; }
  .nav-btn.active .nav-label { color: #0EA5E9; font-weight: 700; }

  /* ── Comparison header ── */
  .comp-title  { font-size: 26px; font-weight: 800; color: #0F172A; letter-spacing: -.7px; }
  .comp-sub    { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
  .comp-label  { font-size: 13px; color: #64748B; font-weight: 500; }
  .comp-badge  { font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
  .comp-badge.up   { color: #22C55E; background: #DCFCE7; }
  .comp-badge.down { color: #EF4444; background: #FEE2E2; }
  .comp-badge.flat { color: #94A3B8; background: #F1F5F9; }

  .empty-state { text-align: center; padding: 60px 20px; }
  .empty-icon  { font-size: 40px; margin-bottom: 10px; }
  .empty-title { font-size: 15px; font-weight: 600; color: #64748B; }
  .empty-sub   { font-size: 13px; color: #94A3B8; margin-top: 4px; }

  /* ── Spin animation ── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin 1s linear infinite; }
</style>
</head>
<body>
<div id="app">
  <!-- LEADERBOARD SCREEN -->
  <div id="screen-leaderboard" class="screen">
    <div class="header">
      <div class="header-row">
        <div>
          <div class="screen-title">Rapid Tracker</div>
          <div class="screen-sub" id="player-count">— players tracked</div>
        </div>
        <div class="header-actions">
          <button class="btn-icon btn-primary" id="btn-add-open" title="Add player">
            <svg width="18" height="18" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
              <line x1="9" y1="3" x2="9" y2="15"/><line x1="3" y1="9" x2="15" y2="9"/>
            </svg>
          </button>
          <button class="btn-icon btn-secondary" id="btn-refresh" title="Refresh all">
            <svg id="refresh-icon" width="16" height="16" fill="none" stroke="#64748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 8A6 6 0 1 1 8 2"/><polyline points="14 2 14 8 8 8"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="sync-section">
        <div class="sync-row">
          <span class="label">Database Sync</span>
          <span class="sync-status" id="sync-status">Ready</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      </div>
    </div>
    <div class="screen-body">
      <div class="player-list" id="player-list"></div>
    </div>
  </div>

  <!-- COMPARISON SCREEN -->
  <div id="screen-comparison" class="screen hidden">
    <div class="header">
      <div class="screen-title">Rating Comparison</div>
    </div>
    <div class="screen-body" style="padding:20px;" id="comparison-body"></div>
  </div>

  <!-- SETTINGS SCREEN -->
  <div id="screen-settings" class="screen hidden">
    <div class="header">
      <div class="screen-title">Settings</div>
    </div>
    <div class="screen-body" style="padding:20px;">
      <div class="settings-section">
        <p class="label" style="margin-bottom:10px">Usage Settings</p>
        <div class="settings-card">
          <div class="settings-inner">
            <div class="threshold-row">
              <span class="threshold-label">Inactivity threshold</span>
              <span class="threshold-badge" id="threshold-badge">7 days</span>
            </div>
            <input type="range" min="1" max="30" value="7" id="threshold-range">
            <div class="range-ticks" id="range-ticks"></div>
          </div>
        </div>
      </div>
      <div class="settings-section">
        <p class="label" style="margin-bottom:10px">Data Management</p>
        <div class="settings-card">
          <button class="settings-row" id="btn-export">
            <svg width="18" height="18" fill="none" stroke="#0EA5E9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3v10M5 9l4-4 4 4"/><line x1="3" y1="15" x2="15" y2="15"/></svg>
            <span class="settings-row-label">Export data</span>
            <svg width="16" height="16" fill="none" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round"><polyline points="6,4 10,8 6,12"/></svg>
          </button>
          <button class="settings-row" id="btn-import-trigger">
            <svg width="18" height="18" fill="none" stroke="#0EA5E9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 13V3M5 9l4 4 4-4"/><line x1="3" y1="15" x2="15" y2="15"/></svg>
            <span class="settings-row-label">Import data</span>
            <svg width="16" height="16" fill="none" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round"><polyline points="6,4 10,8 6,12"/></svg>
          </button>
          <button class="settings-row" id="btn-clear">
            <svg width="18" height="18" fill="none" stroke="#EF4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="14" height="14" rx="3" fill="#FEE2E2" stroke="#EF4444"/><path d="M7 7l4 4M11 7l-4 4"/></svg>
            <span class="settings-row-label danger">Clear all data</span>
          </button>
        </div>
      </div>
      <div class="version-block">
        <div class="version-name">Rapid Tracker</div>
        <div class="version-num">Version 1.0.0</div>
      </div>
    </div>
  </div>

  <!-- ADD PLAYER MODAL -->
  <div id="modal-add" class="modal-backdrop hidden">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title">Add Player</div>
      <div class="modal-sub">Enter a Chess.com username to track</div>
      <input type="text" class="modal-input" id="add-input" placeholder="e.g. hikaru, magnuscarlsen…" autocomplete="off" autocapitalize="none" spellcheck="false">
      <div class="modal-error" id="add-error"></div>
      <div class="modal-actions">
        <button class="btn-full btn-cancel" id="btn-add-cancel">Cancel</button>
        <button class="btn-full btn-add-confirm" id="btn-add-confirm" style="flex:2">Add Player</button>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-tab="leaderboard">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="7" r="4"/>
        <path d="M4 20c0-4 3.1-7 7-7s7 3 7 7"/>
        <path d="M16 3.5c1.5.5 2.5 1.8 2.5 3.5s-1 3-2.5 3.5" stroke-width="1.5"/>
        <path d="M5 3.5C3.5 4 2.5 5.3 2.5 7S3.5 10 5 10.5" stroke-width="1.5"/>
      </svg>
      <span class="nav-label">Leaderboard</span>
    </button>
    <button class="nav-btn" data-tab="comparison">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <rect x="3"  y="12" width="4" height="8" rx="1"/>
        <rect x="9"  y="7"  width="4" height="13" rx="1"/>
        <rect x="15" y="4"  width="4" height="16" rx="1"/>
      </svg>
      <span class="nav-label">Comparison</span>
    </button>
    <button class="nav-btn" data-tab="settings">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06-.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
      </svg>
      <span class="nav-label">Settings</span>
    </button>
  </nav>
</div>

<input type="file" id="import-file" accept=".json" style="display:none">

<script>

// ─── State ───────────────────────────────────────────────────────────────────
let players = [];
let inactivityDays = INACTIVITY_DAYS_DEFAULT;
let syncing = false;
let activeTab = 'leaderboard';

// ─── Persistence ─────────────────────────────────────────────────────────────
function savePlayers() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ players, inactivityDays })); } catch(_) {}
}

function loadPlayers() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      players = (data.players || []).map(p => ({ ...p, history: p.history || [p.rapidRating] }));
      inactivityDays = data.inactivityDays || INACTIVITY_DAYS_DEFAULT;
      return;
    }
  } catch(_) {}
  // First run — seed with defaults
  players = DEFAULT_PLAYERS.map(p => ({ ...p }));
  savePlayers();
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function hashColor(username) {
  let h = 0;
  for (let i = 0; i < username.length; i++) h = (h * 31 + username.charCodeAt(i)) & 0xffff;
  return AVATAR_COLORS[h % AVATAR_COLORS.length];
}

function isMIA(p) {
  return (Date.now() / 1000 - p.lastGameDate) > inactivityDays * 86400;
}

function makeSVGSparkline(history, mia, w = 60, h = 24) {
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('width', w); svg.setAttribute('height', h);

  if (!history || history.length < 2) {
    svg.style.opacity = '0.3';
    const line = document.createElementNS(ns, 'line');
    line.setAttribute('x1','2'); line.setAttribute('y1', h/2);
    line.setAttribute('x2', w-2); line.setAttribute('y2', h/2);
    line.setAttribute('stroke','#94A3B8'); line.setAttribute('stroke-width','1.5');
    line.setAttribute('stroke-dasharray','3,2');
    svg.appendChild(line); return svg;
  }

  const min = Math.min(...history), max = Math.max(...history);
  const range = max - min || 1, pad = 2;
  const pts = history.map((v, i) => {
    const x = pad + (i / (history.length - 1)) * (w - pad*2);
    const y = h - pad - ((v - min) / range) * (h - pad*2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');

  const trend = history[history.length-1] - history[0];
  const color = mia ? '#94A3B8' : trend >= 0 ? '#22C55E' : '#EF4444';
  const lastPt = pts.split(' ').pop().split(',');

  const poly = document.createElementNS(ns, 'polyline');
  poly.setAttribute('points', pts); poly.setAttribute('fill','none');
  poly.setAttribute('stroke', color); poly.setAttribute('stroke-width','1.8');
  poly.setAttribute('stroke-linecap','round'); poly.setAttribute('stroke-linejoin','round');
  svg.appendChild(poly);

  const dot = document.createElementNS(ns, 'circle');
  dot.setAttribute('cx', lastPt[0]); dot.setAttribute('cy', lastPt[1]);
  dot.setAttribute('r','2.5'); dot.setAttribute('fill', color);
  svg.appendChild(dot);
  return svg;
}

// ─── API ─────────────────────────────────────────────────────────────────────
// Direct Chess.com API call — works perfectly in a real browser (no CORS issues).
async function fetchRating(username) {
  const res = await fetch(`${CHESS_API}/${username}/stats`);
  if (!res.ok) throw new Error(`Player "${username}" not found (HTTP ${res.status})`);
  const data = await res.json();
  const rating = data.chess_rapid?.last?.rating ?? null;
  const date   = data.chess_rapid?.last?.date   ?? null; // Unix seconds
  const peak   = data.chess_rapid?.best?.rating  ?? rating;
  return { rating, date, peak };
}

// ─── Render: Leaderboard ─────────────────────────────────────────────────────
function renderLeaderboard() {
  const list = document.getElementById('player-list');
  document.getElementById('player-count').textContent = `${players.length} player${players.length !== 1 ? 's' : ''} tracked`;
  list.innerHTML = '';

  const sorted = [...players].sort((a, b) => b.rapidRating - a.rapidRating);

  sorted.forEach((p, i) => {
    const mia = isMIA(p);
    const [c1, c2] = hashColor(p.username);
    const diff = p.rapidRating - p.previousRating;

    const row = document.createElement('div');
    row.className = 'player-row';
    row.dataset.username = p.username;

    // Rank
    const rank = document.createElement('span');
    rank.className = 'rank mono';
    rank.textContent = String(i + 1).padStart(2, '0');

    // Avatar
    const avatar = document.createElement('div');
    avatar.className = 'avatar' + (mia ? ' mia' : '');
    if (!mia) {
      avatar.style.background = `linear-gradient(135deg,${c1},${c2})`;
      avatar.style.boxShadow = `0 2px 8px ${c1}55`;
    }
    avatar.textContent = p.username.slice(0, 2).toUpperCase();

    // Info
    const info = document.createElement('div');
    info.className = 'player-info';

    const nameRow = document.createElement('div');
    nameRow.className = 'player-name-row';

    const name = document.createElement('span');
    name.className = 'player-name' + (mia ? ' mia' : '');
    name.textContent = p.username;
    nameRow.appendChild(name);

    if (mia) {
      const badge = document.createElement('span');
      badge.className = 'mia-badge';
      badge.textContent = 'MIA';
      nameRow.appendChild(badge);
    }

    const sparkWrap = document.createElement('div');
    sparkWrap.className = 'sparkline-wrap';
    sparkWrap.appendChild(makeSVGSparkline(p.history, mia));
    info.appendChild(nameRow);
    info.appendChild(sparkWrap);

    // Stats
    const stats = document.createElement('div');
    stats.className = 'player-stats';

    const ratingEl = document.createElement('div');
    ratingEl.className = 'rating-value mono' + (mia ? ' mia' : '');
    ratingEl.textContent = p.rapidRating.toLocaleString();

    const deltaEl = document.createElement('div');
    if (mia) {
      deltaEl.className = 'delta flat'; deltaEl.textContent = '—';
    } else if (diff === 0) {
      deltaEl.className = 'delta flat'; deltaEl.textContent = '±0';
    } else {
      deltaEl.className = 'delta ' + (diff > 0 ? 'up' : 'down');
      deltaEl.textContent = (diff > 0 ? '↑' : '↓') + Math.abs(diff);
    }
    stats.appendChild(ratingEl); stats.appendChild(deltaEl);

    // Remove btn
    const rmBtn = document.createElement('button');
    rmBtn.className = 'remove-btn';
    rmBtn.title = 'Remove player';
    rmBtn.innerHTML = `<svg width="8" height="8" fill="none" stroke="#EF4444" stroke-width="2" stroke-linecap="round"><line x1="1" y1="1" x2="7" y2="7"/><line x1="7" y1="1" x2="1" y2="7"/></svg>`;
    rmBtn.addEventListener('click', e => { e.stopPropagation(); removePlayer(p.username); });

    row.appendChild(rank); row.appendChild(avatar); row.appendChild(info);
    row.appendChild(stats); row.appendChild(rmBtn);
    list.appendChild(row);
  });
}

// ─── Render: Comparison ──────────────────────────────────────────────────────
function renderComparison() {
  const body = document.getElementById('comparison-body');
  const active = [...players]
    .filter(p => !isMIA(p))
    .sort((a, b) => b.rapidRating - a.rapidRating)
    .slice(0, 10);

  const avgGrowth = active.length
    ? Math.round(active.reduce((s, p) => s + (p.rapidRating - p.previousRating), 0) / active.length)
    : 0;

  let html = `
    <div style="margin-bottom:20px">
      <div class="comp-title">Top ${active.length} Active Players</div>
      <div class="comp-sub">
        <span class="comp-label">Current Season Analysis</span>
        <span class="comp-badge ${avgGrowth > 0 ? 'up' : avgGrowth < 0 ? 'down' : 'flat'}">
          ${avgGrowth > 0 ? '+' : ''}${avgGrowth} avg points
        </span>
      </div>
    </div>`;

  if (active.length === 0) {
    html += `<div class="empty-state">
      <div class="empty-icon">🏃</div>
      <div class="empty-title">No active players</div>
      <div class="empty-sub">Players who played within ${inactivityDays} days appear here</div>
    </div>`;
    body.innerHTML = html; return;
  }

  const maxR = Math.max(...active.map(p => p.rapidRating));
  const minR = Math.min(...active.map(p => p.rapidRating));
  const range = maxR - minR || 1;

  // Chart
  html += `<div class="chart-card"><div class="chart-area">
    <div class="chart-yaxis">
      <span>${maxR}</span>
      <span>${Math.round((maxR+minR)/2)}</span>
      <span>${minR}</span>
    </div>
    <div class="chart-bars">`;

  active.forEach(p => {
    const barH = Math.max(12, ((p.rapidRating - minR + range * 0.05) / (range * 1.1)) * 148);
    const diff = p.rapidRating - p.previousRating;
    const [c1, c2] = hashColor(p.username);
    const diffColor = diff > 0 ? '#22C55E' : diff < 0 ? '#EF4444' : '#94A3B8';
    const shortName = p.username.length > 5 ? p.username.slice(0,4)+'…' : p.username;
    html += `<div class="chart-bar-col">
      <span class="chart-delta-label" style="color:${diffColor}">${diff > 0 ? '+' : ''}${diff || '0'}</span>
      <div class="chart-bar" style="height:${barH}px;background:linear-gradient(to top,${c2},${c1});box-shadow:0 2px 6px ${c1}44"></div>
      <span class="chart-bar-name">${shortName}</span>
    </div>`;
  });

  html += `</div></div></div>`;

  // Legend
  html += `
    <div class="legend-card">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="legend-dot" style="background:linear-gradient(135deg,#0EA5E9,#3B82F6)"></div>
        <span class="legend-label">Active Players</span>
      </div>
      <span class="legend-value" style="color:#0F172A">Colored Bars</span>
    </div>
    <div class="legend-card">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="legend-dot" style="background:#CBD5E1"></div>
        <span class="legend-label" style="color:#94A3B8">Ghost Players (MIA)</span>
      </div>
      <span class="legend-value" style="color:#94A3B8">Not shown</span>
    </div>`;

  // Detail list
  html += `<div class="detail-list-card">
    <div class="detail-list-header"><span class="label">Active Player Details</span></div>`;
  active.forEach(p => {
    const [c1] = hashColor(p.username);
    const diff = p.rapidRating - p.previousRating;
    html += `<div class="detail-row">
      <div class="detail-bar" style="background:${c1}"></div>
      <span class="detail-name">${p.username}</span>
      <span class="detail-rating mono">${p.rapidRating.toLocaleString()}</span>
      <span class="detail-delta ${diff > 0 ? 'up' : diff < 0 ? 'down' : 'flat'}">${diff > 0 ? '+' : ''}${diff}</span>
    </div>`;
  });
  html += `</div>`;

  body.innerHTML = html;
}

// ─── Render: Settings ────────────────────────────────────────────────────────
function renderSettings() {
  const range = document.getElementById('threshold-range');
  const badge = document.getElementById('threshold-badge');
  range.value = inactivityDays;
  badge.textContent = `${inactivityDays} days`;

  const ticks = document.getElementById('range-ticks');
  ticks.innerHTML = [1,7,14,21,30].map(v =>
    `<span class="range-tick ${v === inactivityDays ? 'active' : ''}">${v}</span>`
  ).join('');
}

// ─── Tab switching ────────────────────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  ['leaderboard','comparison','settings'].forEach(t => {
    document.getElementById(`screen-${t}`).classList.toggle('hidden', t !== tab);
  });
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tab);
  });
  // Re-render when switching to comparison since it's data-driven
  if (tab === 'comparison') renderComparison();
  if (tab === 'settings')   renderSettings();
}

// ─── Refresh all ─────────────────────────────────────────────────────────────
async function refreshAll() {
  if (syncing) return;
  syncing = true;

  const icon = document.getElementById('refresh-icon');
  icon.classList.add('spin');
  icon.style.stroke = '#3B82F6';

  setProgress(0, `0/${players.length} Updating…`);

  let errors = 0;
  for (let i = 0; i < players.length; i++) {
    const p = players[i];
    try {
      const { rating, date, peak } = await fetchRating(p.username);
      if (rating !== null) {
        const prevRating = p.rapidRating;
        const history = [...(p.history || [p.rapidRating])];
        if (rating !== history[history.length - 1]) history.push(rating);
        while (history.length > 5) history.shift();

        players[i] = {
          ...p,
          previousRating: prevRating,
          rapidRating:    rating,
          peakRating:     peak !== null ? Math.max(peak, p.peakRating || 0) : p.peakRating,
          history,
          lastGameDate:   date ?? p.lastGameDate,
          lastUpdated:    Date.now(),
        };
      }
    } catch(err) {
      console.error(`[RapidTracker] ${p.username}:`, err.message);
      errors++;
    }

    const done = i + 1;
    const pct  = Math.round((done / players.length) * 100);
    const msg  = errors > 0
      ? `${done}/${players.length} Updated · ${errors} error${errors > 1 ? 's' : ''}`
      : `${done}/${players.length} Updated`;
    setProgress(pct, msg);
    renderLeaderboard();

    // Deliberate delay — avoids Chess.com rate-limiting
    await sleep(150);
  }

  savePlayers();
  const finalMsg = errors > 0
    ? `Done · ${players.length - errors} ok · ${errors} failed`
    : `All ${players.length} players synced ✓`;
  setProgress(100, finalMsg);
  setTimeout(() => setProgress(0, 'Ready'), 3000);

  icon.classList.remove('spin');
  icon.style.stroke = '#64748B';
  syncing = false;
}

function setProgress(pct, msg) {
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('sync-status').textContent = msg;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ─── Add player ───────────────────────────────────────────────────────────────
function openAddModal() {
  document.getElementById('add-input').value = '';
  document.getElementById('add-error').textContent = '';
  document.getElementById('btn-add-confirm').textContent = 'Add Player';
  document.getElementById('btn-add-confirm').disabled = false;
  document.getElementById('modal-add').classList.remove('hidden');
  setTimeout(() => document.getElementById('add-input').focus(), 50);
}
function closeAddModal() {
  document.getElementById('modal-add').classList.add('hidden');
}

async function confirmAdd() {
  const username = document.getElementById('add-input').value.trim().toLowerCase();
  if (!username) return;
  if (players.find(p => p.username === username)) {
    document.getElementById('add-error').textContent = 'Player already in your list.';
    return;
  }
  document.getElementById('btn-add-confirm').textContent = 'Looking up…';
  document.getElementById('btn-add-confirm').disabled = true;
  document.getElementById('add-error').textContent = '';
  try {
    const { rating, date, peak } = await fetchRating(username);
    if (!rating) throw new Error('No Rapid rating found for this player.');
    players.push({
      username,
      rapidRating:    rating,
      previousRating: rating,
      lastUpdated:    Date.now(),
      history:        [rating],
      lastGameDate:   date ?? Math.floor(Date.now() / 1000),
      peakRating:     peak ?? rating,
    });
    savePlayers();
    renderLeaderboard();
    closeAddModal();
  } catch(e) {
    document.getElementById('add-error').textContent = e.message;
    document.getElementById('btn-add-confirm').textContent = 'Add Player';
    document.getElementById('btn-add-confirm').disabled = false;
  }
}

// ─── Remove player ────────────────────────────────────────────────────────────
function removePlayer(username) {
  players = players.filter(p => p.username !== username);
  savePlayers();
  renderLeaderboard();
}

// ─── Export ───────────────────────────────────────────────────────────────────
function exportData() {
  const json = JSON.stringify({ players }, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'chess_ratings.json'; a.click();
  URL.revokeObjectURL(url);
}

// ─── Import ───────────────────────────────────────────────────────────────────
function importData(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.players || !Array.isArray(data.players)) throw new Error('Invalid format');
      players = data.players.map(p => ({ ...p, history: p.history || [p.rapidRating] }));
      savePlayers();
      renderLeaderboard();
    } catch(_) { alert('Invalid backup file — could not import.'); }
  };
  reader.readAsText(file);
}

// ─── Settings wiring ──────────────────────────────────────────────────────────
function initSettings() {
  document.getElementById('threshold-range').addEventListener('input', e => {
    inactivityDays = +e.target.value;
    document.getElementById('threshold-badge').textContent = `${inactivityDays} days`;
    document.querySelectorAll('.range-tick').forEach(el => {
      el.classList.toggle('active', +el.textContent === inactivityDays);
    });
    savePlayers();
  });

  document.getElementById('btn-export').addEventListener('click', exportData);

  document.getElementById('btn-import-trigger').addEventListener('click', () => {
    document.getElementById('import-file').click();
  });
  document.getElementById('import-file').addEventListener('change', e => {
    if (e.target.files[0]) { importData(e.target.files[0]); e.target.value = ''; }
  });

  document.getElementById('btn-clear').addEventListener('click', () => {
    if (confirm('Clear all player data? This cannot be undone.')) {
      players = [];
      savePlayers();
      renderLeaderboard();
    }
  });
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
function init() {
  loadPlayers();

  // Nav
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });

  // Leaderboard controls
  document.getElementById('btn-add-open').addEventListener('click', openAddModal);
  document.getElementById('btn-refresh').addEventListener('click', refreshAll);
  document.getElementById('btn-add-cancel').addEventListener('click', closeAddModal);
  document.getElementById('btn-add-confirm').addEventListener('click', confirmAdd);
  document.getElementById('modal-add').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeAddModal();
  });
  document.getElementById('add-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmAdd();
  });

  initSettings();
  renderLeaderboard();
  renderSettings();
}

init();
</script>
